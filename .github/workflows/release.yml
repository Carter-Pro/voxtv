name: Release

on:
  push:
    tags: ['v*.*.*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build from (e.g., v0.4.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Build Release
        run: swift build -c release

      - name: Package DMG
        run: ./scripts/package-app.sh

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: .build/VoxTV-Installer.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate AppCast
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/VoxTV-Installer.dmg"
          ./scripts/generate-appcast.sh .build/VoxTV-Installer.dmg "$DMG_URL" "$VERSION" > .build/appcast.xml
          echo "AppCast generated for version $VERSION"

      - name: Upload AppCast to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: .build/appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
